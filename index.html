<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Gmusic</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
:root{--bg:#0a0a0a;--card:#141414;--accent:#1db954;--text:#fff;--muted:#aaa}
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
header{padding:16px;display:flex;align-items:center;gap:12px;background:#000;position:sticky;top:0}
header h1{margin:0;font-size:20px;color:var(--accent)}#search{flex:1;padding:10px 14px;border-radius:20px;border:none;background:var(--card);color:#fff}
main{flex:1;overflow:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{background:var(--card);padding:12px;border-radius:12px;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-2px);background:#1a1a1a}
.card img{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;background:#222}
.card h3{margin:8px 0 4px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card p{margin:0;color:var(--muted);font-size:12px}
.player{position:sticky;bottom:0;background:#000;padding:12px;border-top:1px solid #222}
.controls{display:flex;align-items:center;gap:12px}
.controls button{background:var(--accent);border:none;color:#000;width:40px;height:40px;border-radius:50%;font-size:18px}
#progress{flex:1;height:4px;background:#333;border-radius:2px;overflow:hidden}
#bar{height:100%;width:0;background:var(--accent)}
#fileInput{display:none}
.fab{position:fixed;right:16px;bottom:90px;background:var(--accent);color:#000;border:none;width:56px;height:56px;border-radius:50%;font-size:24px}
</style>
</head>
<body>
<header>
<h1>Gmusic</h1>
<input id="search" placeholder="Buscar música ou artista...">
</header>
<main>
<div class="grid" id="list"></div>
</main>
<div class="player">
<div class="controls">
<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>
<div style="flex:1">
<div id="now">Nada tocando</div>
<div id="progress"><div id="bar"></div></div>
</div>
</div>
<audio id="audio" crossorigin="anonymous"></audio>
</div>
<button class="fab" id="add" title="Adicionar suas músicas">+</button>
<input type="file" id="fileInput" accept="audio/*" multiple>

<script>
const demo = [
 {title:"SoundHelix 1",artist:"Demo",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",cover:"https://picsum.photos/300?1"},
 {title:"SoundHelix 2",artist:"Demo",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",cover:"https://picsum.photos/300?2"},
 {title:"SoundHelix 3",artist:"Demo",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",cover:"https://picsum.photos/300?3"},
];
let playlist=[...demo], idx=0;
const list=document.getElementById('list'), audio=document.getElementById('audio'), playBtn=document.getElementById('play'), now=document.getElementById('now'), bar=document.getElementById('bar'), search=document.getElementById('search');

function render(filter=''){
 list.innerHTML='';
 playlist.filter(t=>t.title.toLowerCase().includes(filter)||t.artist.toLowerCase().includes(filter))
 .forEach((t,i)=>{
  const realIdx=playlist.indexOf(t);
  const d=document.createElement('div');d.className='card';d.innerHTML=`<img src="${t.cover}" loading="lazy"><h3>${t.title}</h3><p>${t.artist}</p>`;
  d.onclick=()=>play(realIdx);list.appendChild(d);
 });
}
function play(i){idx=i;const t=playlist[idx];audio.src=t.url;audio.play();playBtn.textContent='⏸';now.textContent=`${t.title} — ${t.artist}`;document.title=t.title;}
playBtn.onclick=()=>audio.paused?audio.play():audio.pause();
audio.onplay=()=>playBtn.textContent='⏸';audio.onpause=()=>playBtn.textContent='▶';
document.getElementById('next').onclick=()=>play((idx+1)%playlist.length);
document.getElementById('prev').onclick=()=>play((idx-1+playlist.length)%playlist.length);
audio.ontimeupdate=()=>{bar.style.width=(audio.currentTime/audio.duration*100||0)+'%';};
document.getElementById('progress').onclick=e=>{const r=e.target.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;};
search.oninput=e=>render(e.target.value.toLowerCase());
document.getElementById('add').onclick=()=>fileInput.click();
fileInput.onchange=e=>{
 [...e.target.files].forEach(f=>{
  const url=URL.createObjectURL(f);
  playlist.push({title:f.name.replace(/\.[^/.]+$/,''),artist:'Minha música',url,cover:'https://picsum.photos/300?music'});
 });
 render(search.value); localStorage.setItem('gmusic',JSON.stringify(playlist.slice(demo.length).map(p=>({title:p.title,artist:p.artist}))));
};
const saved=JSON.parse(localStorage.getItem('gmusic')||'[]');
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
